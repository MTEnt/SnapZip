name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Compile Python helpers
        run: |
          python3 -m py_compile \
            examples/draft_cache.py \
            examples/context_code/cache_reference.py \
            examples/review_demo/app/cache.py \
            examples/review_demo/tests/test_cache.py \
            benchmarks/run.py \
            benchmarks/stress_rbt.py \
            benchmarks/suites/algorithm_20/*.py \
            scripts/public_safety_scan.py

      - name: Run public safety scan
        run: python3 scripts/public_safety_scan.py --root .

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability scan
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Build CLI
        run: go build -o snapzip ./cmd/snapzip

      - name: Run benchmark smoke suite
        run: python3 benchmarks/run.py --suite smoke --snapzip-bin ./snapzip --json /tmp/snapzip-benchmark-smoke.json

      - name: Run context quality suite
        run: python3 benchmarks/run.py --suite context-quality --snapzip-bin ./snapzip --json /tmp/snapzip-context-quality.json

      - name: Install public benchmark dependencies
        run: python3 -m pip install --upgrade "huggingface_hub>=0.23"

      - name: Run public retrieval quality gate
        run: |
          python3 benchmarks/run.py --suite repobench-r --snapzip-bin ./snapzip --repobench-sample-size 100 \
            --min-repobench-snapzip-acc1 0.17 \
            --min-repobench-snapzip-acc3 0.34 \
            --min-repobench-snapzip-acc5 0.59 \
            --min-repobench-snapzip-mrr5 0.298667 \
            --min-repobench-snapzip-ndcg5 0.369709 \
            --max-repobench-snapzip-duplicate-top5-records 0 \
            --max-repobench-snapzip-duplicate-top5-slots 0 \
            --min-repobench-snapzip-acc5-over-bm25 0.06 \
            --min-repobench-snapzip-mrr5-over-bm25 0.03 \
            --min-repobench-snapzip-ndcg5-over-bm25 0.04 \
            --min-repobench-snapzip-acc5-over-jaccard 0.10 \
            --json /tmp/snapzip-repobench-r-quality-gate.json
